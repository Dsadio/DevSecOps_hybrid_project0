---
- name: Installation et configuration sécurisée d'Apache
  hosts: all
  become: true

  tasks:

    # 1. Mise à jour du cache apt
    - name: Mise à jour du cache apt
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600


    # 2. Installation d'Apache
    - name: Installation d'Apache
      ansible.builtin.apt:
        name: apache2
        state: present


    # 3. Désactivation des modules Apache inutiles (idempotent, non interactif)
    - name: Désactiver les modules Apache inutiles
      community.general.apache2_module:
        name: "{{ item }}"
        state: absent
        force: true
      loop:
        - autoindex
        - status
        - userdir
      notify: Restart apache


    # 4. Activation du module headers
    - name: Activer le module headers
      community.general.apache2_module:
        name: headers
        state: present
      notify: Restart apache


    # 5. Configuration des en-têtes de sécurité HTTP
    - name: Configurer les en-têtes de sécurité
      ansible.builtin.copy:
        dest: /etc/apache2/conf-available/security-headers.conf
        content: |
          Header always set X-Frame-Options "SAMEORIGIN"
          Header always set X-Content-Type-Options "nosniff"
          Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        owner: root
        group: root
        mode: '0644'
      notify: Restart apache


    # 6. Activation de la configuration sécurité
    - name: Activer la configuration des en-têtes de sécurité
      ansible.builtin.command:
        cmd: a2enconf security-headers
      args:
        creates: /etc/apache2/conf-enabled/security-headers.conf
      notify: Restart apache


    # 7. Suppression de la page Apache par défaut
    - name: Supprimer la page Apache par défaut
      ansible.builtin.file:
        path: /var/www/html/index.html
        state: absent


    # 8. Déploiement de la page personnalisée
    - name: Déployer la page d'accueil personnalisée
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/index.html"
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'


    # 9. Vérification du service Apache
    - name: S'assurer qu'Apache est démarré et activé au démarrage
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: true


  handlers:

    # Redémarrage Apache après modification
    - name: Restart apache
      ansible.builtin.service:
        name: apache2
        state: restarted