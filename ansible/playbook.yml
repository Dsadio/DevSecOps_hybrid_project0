---
- name: Déploiement sécurisé d'un site statique Apache2 (DevSecOps)
  hosts: all
  become: true

  vars:
    web_root: /var/www/html
    site_files:
      - index.html
      - style.css
      - script.js
    apache_modules_disabled:
      - autoindex
      - status
      - userdir

  tasks:

    # 1. Mise à jour du cache apt
    - name: Mise à jour du cache apt
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    # 2. Installation d'Apache2
    - name: Installation d'Apache2
      ansible.builtin.apt:
        name: apache2
        state: present

    # 3. Désactivation des modules Apache inutiles
    - name: Désactiver les modules Apache inutiles
      community.general.apache2_module:
        name: "{{ item }}"
        state: absent
        force: true
      loop: "{{ apache_modules_disabled }}"
      notify: Restart apache

    # 4. Activation du module headers
    - name: Activer le module headers
      community.general.apache2_module:
        name: headers
        state: present
      notify: Restart apache

    # 5. Configuration des en-têtes de sécurité HTTP
    - name: Configurer les en-têtes de sécurité
      ansible.builtin.copy:
        dest: /etc/apache2/conf-available/security-headers.conf
        content: |
          Header always set X-Frame-Options "SAMEORIGIN"
          Header always set X-Content-Type-Options "nosniff"
          Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        owner: root
        group: root
        mode: '0644'
      notify: Restart apache

    # 6. Activation de la configuration sécurité
    - name: Activer la configuration des en-têtes de sécurité
      ansible.builtin.command:
        cmd: a2enconf security-headers
      args:
        creates: /etc/apache2/conf-enabled/security-headers.conf
      notify: Restart apache

    # 7. Répertoire web
    - name: S'assurer que le répertoire web existe
      ansible.builtin.file:
        path: "{{ web_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    # 8. Déploiement du site (index.html remplace la page Apache par défaut)
    - name: Déployer les fichiers du site statique
      ansible.builtin.copy:
        src: "files/{{ item }}"
        dest: "{{ web_root }}/{{ item }}"
        owner: www-data
        group: www-data
        mode: '0644'
      loop: "{{ site_files }}"
      notify: Restart apache

    # 9. Service Apache démarré et activé au boot
    - name: S'assurer qu'Apache est démarré et activé au démarrage
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: true

    # 10. Test HTTP du service
    - name: Vérifier que le site répond en HTTP (code 200)
      ansible.builtin.uri:
        url: http://localhost/
        status_code: 200
        return_content: false
      register: http_check
      retries: 3
      delay: 5
      until: http_check.status == 200
      changed_when: false

  handlers:

    - name: Restart apache
      ansible.builtin.service:
        name: apache2
        state: restarted