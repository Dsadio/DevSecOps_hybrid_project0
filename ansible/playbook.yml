---
- name: Installation et configuration sécurisée d'Apache
  hosts: all
  become: true

  tasks:

    # 1. Mise à jour du cache apt
    - name: Mise à jour du cache apt
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600


    # 2. Installation d'Apache
    - name: Installation d'Apache
      ansible.builtin.apt:
        name: apache2
        state: present


    # 3. Vérification des modules Apache actifs
    - name: Vérifier les modules Apache actifs
      ansible.builtin.command:
        cmd: apache2ctl -M
      register: apache_modules
      changed_when: false


    # 4. Désactivation des modules Apache inutiles
    - name: Désactiver les modules Apache inutiles
      ansible.builtin.command:
        cmd: "a2dismod {{ item }}"
      loop:
        - autoindex
        - status
        - userdir
      when: item in apache_modules.stdout
      register: disable_modules
      changed_when: "'Module' in disable_modules.stdout"
      notify: Restart apache


    # 5. Activation du module headers
    - name: Activer le module headers
      ansible.builtin.command:
        cmd: a2enmod headers
      register: enable_headers
      changed_when: "'Enabling' in enable_headers.stdout"
      notify: Restart apache


    # 6. Configuration des en-têtes de sécurité HTTP
    - name: Configurer les en-têtes de sécurité
      ansible.builtin.copy:
        dest: /etc/apache2/conf-available/security-headers.conf
        content: |
          Header always set X-Frame-Options "SAMEORIGIN"
          Header always set X-Content-Type-Options "nosniff"
          Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        owner: root
        group: root
        mode: '0644'
      notify: Restart apache


    # 7. Activation de la configuration sécurité
    - name: Activer la configuration des en-têtes de sécurité
      ansible.builtin.command:
        cmd: a2enconf security-headers
      args:
        creates: /etc/apache2/conf-enabled/security-headers.conf
      notify: Restart apache


    # 8. Suppression de la page Apache par défaut
    - name: Supprimer la page Apache par défaut
      ansible.builtin.file:
        path: /var/www/html/index.html
        state: absent


    # 9. Déploiement de la page personnalisée
    - name: Déployer la page d'accueil personnalisée
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/index.html"
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'


    # 10. Vérification du service Apache
    - name: S'assurer qu'Apache est démarré et activé au démarrage
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: true


  handlers:

    # Redémarrage Apache après modification
    - name: Restart apache
      ansible.builtin.service:
        name: apache2
        state: restarted
