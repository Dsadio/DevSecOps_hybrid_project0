repos:

  # ══════════════════════════════════════════════
  # GÉNÉRAL : Qualité et détection de fichiers dangereux
  # ══════════════════════════════════════════════
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: detect-private-key


  # ══════════════════════════════════════════════
  # SÉCURITÉ : Détection avancée des secrets
  # ══════════════════════════════════════════════
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks


  # ══════════════════════════════════════════════
  # TERRAFORM : Formatage, validation et qualité
  # ══════════════════════════════════════════════
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint


  # ══════════════════════════════════════════════
  # TERRAFORM SECURITY : Analyse IaC
  # ══════════════════════════════════════════════
  - repo: https://github.com/aquasecurity/tfsec
    rev: v1.28.13
    hooks:
      - id: tfsec
        files: \.tf$


  # ══════════════════════════════════════════════
  # ANSIBLE : Validation des playbooks
  # ══════════════════════════════════════════════
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.6.0
    hooks:
      - id: ansible-lint
        files: ^ansible/.*\.ya?ml$
        language_version: python3.12
